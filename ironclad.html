<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ironclad — 10 Decks</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif;}
  #hud{position:fixed;top:12px;left:14px;color:#9fd8ff;font-size:14px;letter-spacing:2px;
       text-shadow:0 0 8px rgba(80,180,255,.6);pointer-events:none;z-index:5;}
  #hud .title{font-size:17px;font-weight:600;color:#cfeaff;}
  #prompt{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#bfe9ff;
          font-size:16px;letter-spacing:1px;background:rgba(10,25,40,.55);border:1px solid rgba(120,200,255,.4);
          padding:8px 18px;border-radius:4px;display:none;pointer-events:none;z-index:5;}
  #bridgeNav{position:fixed;top:85px;left:50%;transform:translateX(-50%);color:#ffd89f;
          font-size:16px;letter-spacing:1px;background:rgba(40,25,10,.55);border:1px solid rgba(255,180,100,.5);
          padding:8px 18px;border-radius:4px;display:none;pointer-events:none;z-index:5;}
  #debug{position:fixed;top:12px;right:14px;color:#7fffb0;font-size:13px;font-family:Consolas,monospace;
         background:rgba(0,15,8,.55);border:1px solid rgba(0,255,140,.3);padding:8px 12px;border-radius:4px;
         display:none;white-space:pre;pointer-events:none;z-index:5;}
  #help{position:fixed;bottom:14px;left:14px;color:#8fb8d8;font-size:12px;letter-spacing:1px;
        pointer-events:none;z-index:5;opacity:.8;}
  #edit{position:fixed;top:50px;left:50%;transform:translateX(-50%);color:#ffd070;font-size:15px;
        letter-spacing:3px;display:none;pointer-events:none;z-index:5;text-shadow:0 0 10px rgba(255,180,60,.7);}
  #fedit{position:fixed;top:80px;left:50%;transform:translateX(-50%);color:#00ffcc;font-size:14px;
         letter-spacing:3px;display:none;pointer-events:none;z-index:5;text-shadow:0 0 10px rgba(0,255,180,.7);}
  #walledit{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);color:#ffd070;font-size:13px;
            letter-spacing:2px;background:rgba(20,15,0,.7);border:1px solid rgba(255,180,60,.4);
            padding:6px 14px;border-radius:4px;display:none;pointer-events:none;z-index:5;}
  #start{position:fixed;inset:0;background:radial-gradient(ellipse at center,#06121f 0%,#010409 75%);
         display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;cursor:pointer;}
  #start h1{color:#cfeaff;letter-spacing:8px;font-weight:300;font-size:34px;margin:0 0 10px;}
  #start p{color:#6f9ab8;letter-spacing:2px;font-size:14px;}
</style>
</head>
<body>
<div id="walledit"></div>
<div id="start"><h1>IRONCLAD</h1><p>DECK A &mdash; CLICK TO BEGIN</p></div>
<div id="hud"><span class="title">IRONCLAD</span><br>DECK A</div>
<div id="prompt">Press O to open door</div>
<div id="bridgeNav"></div>
<div id="debug"></div>
<div id="edit">— EDIT MODE —</div>
<div id="fedit">— FURNITURE EDIT (Room 1 → all) —</div>
<div id="help">↑↓ move &nbsp;|&nbsp; ←→ turn &nbsp;|&nbsp; SHIFT run &nbsp;|&nbsp; O door &nbsp;|&nbsp; PgUp/PgDn change deck (in elevator) &nbsp;|&nbsp; on Bridge: E/Q toggle Bridge⇄Engine Room &nbsp;|&nbsp; G debug &nbsp;|&nbsp; M furniture edit</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script>
/* ============ UAS IRONCLAD — RING DECK ============
   12 door slots: 4 hub connections (idx 0,3,6,9) + 8 rooms.
   Rooms expanded to use full interior space.
====================================================== */

const PLAYER_Y   = 50;
const R_OUT      = 1600;
const R_IN       = 1400;
const WALL_H     = 120;
const TOTAL_SLOTS = 12;
const ROOM_DEPTH = 640;   // reduced 30 feet
const ROOM_HALF  = 200;   // safe width — stays inside the inner wall arc
const DOOR_HALF  = 42;

let scene, camera, renderer, clock;
let yaw = Math.PI / 2;
let keys = {};
let editMode = false;
const TURN_SPEED = 1.50;
let doors = [];
let elDoors = [];
let innerDoors = [];  // bedroom & bathroom sliding doors
let hubWalls = [];
let selectedWallMesh = null;

// Multi-deck system
const DECK_HEIGHT = 300;
const DECK_LETTERS = ['A','B','C','D','E','F','G','H','I','J','BRIDGE'];
// Distinct floor guide-line color per deck
const DECK_GUIDE_COLORS = [0x2f6f9f, 0x3f9f6f, 0x9f6f2f, 0x9f2f6f, 0x6f2f9f, 0x9f9f2f, 0x2f9f9f, 0x9f4f4f, 0x4f9f4f, 0x6f6f6f, 0xff5533];
const BRIDGE_DECK_INDEX = 10;
const BRIDGE_STATIONS = ['HELM','NAVIGATION','COMMUNICATIONS','TACTICAL','ENGINEERING','SCIENCE','SENSORS'];
const BRIDGE_ROOM_R = 280;
const BRIDGE_ELEV_Z = BRIDGE_ROOM_R + 70; // center of the elevator cab (embedded in the wall)
const BRIDGE_ELEV_GAP = 0.24;  // angular half-width of the wall opening for the elevator door
const SCREEN_R = BRIDGE_ROOM_R - 10;
const SCREEN_H = 170;
const SCREEN_ARC_HALF = Math.PI * 0.62;   // wraps ~224° around the front
const PANEL_R = 130;
const PANEL_ARC_HALF = Math.PI * 0.56;
let engineRoomActive = false;
let bridgeRoomGroup = null, engineRoomGroup = null;
let bridgeElevCtx = null, bridgeElevTex = null;
let currentDeck = 0;
let deckGroups = [];
let doorsByDeck = [], elDoorsByDeck = [], innerDoorsByDeck = [], hubWallsByDeck = [];
let allRoomFurnitureByDeck = [];
let elevatorCooldown = 0;
let stretchCooldown = 0;

// Furniture system globals
let furnitureEditMode = false;
let gameStarted = false;
let selectedFurniture = null;
let furnitureCooldown = 0;
let room1Furniture = [];
let extraEditables = [];
let allRoomFurniture = [];
let _pendingFurniture = [];
let matBed, matBedPad, matDesk, matHolo, matHoloF, matSofa, matSofaPad,
    matTable, matShower, matGlowG, matGlowC, matWhite, matChair, matScreen, matSelectW;
let _raycaster;
let _fRaycaster;
const EL_HALF  = 44;
const EL_DW    = 32;
const EL_DH    = 90;
const HUB_SIZE = 220;
const HUB_HALF = HUB_SIZE / 2;
const HUB_WALL = 6;
const HUB_CORRIDOR_W = 120;
const HUB_CORRIDOR_HALF = HUB_CORRIDOR_W / 2;
const HUB_ARM_LEN = R_IN - HUB_HALF + 20;
const RING_EL_X = R_IN - EL_HALF;   // Deck A: secondary elevator entrance, ring-hallway end of +X arm (between rooms 1 & 8)

function updateWallLabel() {
  const we = document.getElementById('walledit');
  if (selectedWallMesh && editMode) {
    const g = selectedWallMesh.geometry.parameters;
    we.style.display = 'block';
    we.textContent = `WALL SELECTED — Shift+↑↓ or ←→ to stretch  |  W:${g.width.toFixed(0)} H:${g.height.toFixed(0)} D:${g.depth.toFixed(0)}`;
  } else {
    we.style.display = 'none';
  }
}

init();
animate();

function init() {
  // Furniture materials — first thing so they're ready for room loop
  _raycaster  = new THREE.Raycaster();
  _fRaycaster = new THREE.Raycaster();
  matBed     = new THREE.MeshStandardMaterial({ color: 0x0a1a2e, metalness: 0.7,  roughness: 0.35 });
  matBedPad  = new THREE.MeshStandardMaterial({ color: 0x0d2a40, metalness: 0.2,  roughness: 0.8 });
  matDesk    = new THREE.MeshStandardMaterial({ color: 0x1a2030, metalness: 0.85, roughness: 0.25 });
  matHolo    = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.18, side: THREE.DoubleSide });
  matHoloF   = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.55 });
  matSofa    = new THREE.MeshStandardMaterial({ color: 0x0d1f30, metalness: 0.5,  roughness: 0.6 });
  matSofaPad = new THREE.MeshStandardMaterial({ color: 0x112840, metalness: 0.1,  roughness: 0.9 });
  matTable   = new THREE.MeshStandardMaterial({ color: 0x162030, metalness: 0.9,  roughness: 0.15 });
  matShower  = new THREE.MeshStandardMaterial({ color: 0x0d1820, metalness: 0.8,  roughness: 0.3 });
  matGlowG   = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  matGlowC   = new THREE.MeshBasicMaterial({ color: 0x00ccff });
  matWhite   = new THREE.MeshStandardMaterial({ color: 0xddeeff, metalness: 0.3,  roughness: 0.7 });
  matChair   = new THREE.MeshStandardMaterial({ color: 0x0a1520, metalness: 0.75, roughness: 0.3 });
  matScreen  = new THREE.MeshBasicMaterial({ color: 0x003344 });
  matSelectW = new THREE.MeshStandardMaterial({ color: 0x00ffaa, metalness: 0.9,  roughness: 0.1, wireframe: true });

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x05080d, 900, 2600);

  camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.5, 12000);
  camera.position.set(1500, PLAYER_Y, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // LIGHTING
  scene.add(new THREE.HemisphereLight(0xbcd6ee, 0x2a2f38, 0.85));
  const dir = new THREE.DirectionalLight(0xdde8ff, 0.5);
  dir.position.set(800, 1400, -600);
  scene.add(dir);
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    const p = new THREE.PointLight(0x9fc8ff, 0.20, 1800);
    p.position.set(Math.cos(a) * 1500, WALL_H - 18, Math.sin(a) * 1500);
    scene.add(p);
  }

  // MATERIALS
  const matHull   = new THREE.MeshStandardMaterial({ color: 0x8e979f, metalness: 0.85, roughness: 0.42, flatShading: true });
  const matHullDk = new THREE.MeshStandardMaterial({ color: 0x6b737b, metalness: 0.85, roughness: 0.5,  flatShading: true });
  const matFloor  = new THREE.MeshStandardMaterial({ color: 0x6e7478, metalness: 0.1,  roughness: 0.9 });
  const matCeil   = new THREE.MeshStandardMaterial({ color: 0x7a8285, metalness: 0.1,  roughness: 0.9 });
  const matTrim   = new THREE.MeshStandardMaterial({ color: 0x3e4750, metalness: 0.9,  roughness: 0.35 });
  const matGlow   = new THREE.MeshBasicMaterial({ color: 0xcfe8ff });
  const matGlass  = new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.10, side: THREE.DoubleSide });
  const matDoor   = new THREE.MeshStandardMaterial({ color: 0x5a86a8, metalness: 0.8, roughness: 0.4, flatShading: true });
  const matRoom   = new THREE.MeshStandardMaterial({ color: 0x6e7478, metalness: 0.1, roughness: 0.9, flatShading: true });
  // Distinct accent tints for each of the 8 rooms
  const ROOM_COLORS = [0x6e7478, 0x4a6e84, 0x84684a, 0x4a8468, 0x84486e, 0x84784a, 0x4a5a84, 0x6e8448];

function buildBridgeDeck(deckIndex) {
  const deckGroup = new THREE.Group();
  deckGroup.position.y = -deckIndex * DECK_HEIGHT;
  deckGroup.userData.deckIndex = deckIndex;
  scene.add(deckGroup);
  const doors = [], elDoors = [], innerDoors = [], hubWalls = [];

  function buildRoundRoom(parent, color, accent) {
    const matWall = new THREE.MeshStandardMaterial({ color, metalness: 0.8, roughness: 0.4, flatShading: true, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(new THREE.CircleGeometry(BRIDGE_ROOM_R, 48), matFloor);
    floor.rotation.x = -Math.PI / 2;
    parent.add(floor);
    const ceil = new THREE.Mesh(new THREE.CircleGeometry(BRIDGE_ROOM_R, 48), matCeil);
    ceil.rotation.x = Math.PI / 2; ceil.position.y = WALL_H;
    parent.add(ceil);
    const wall = new THREE.Mesh(new THREE.CylinderGeometry(BRIDGE_ROOM_R, BRIDGE_ROOM_R, WALL_H, 48, 1, true, BRIDGE_ELEV_GAP, Math.PI * 2 - BRIDGE_ELEV_GAP * 2), matWall);
    wall.position.y = WALL_H / 2;
    parent.add(wall);
    const ring = new THREE.Mesh(new THREE.RingGeometry(BRIDGE_ROOM_R - 10, BRIDGE_ROOM_R - 2, 48), new THREE.MeshBasicMaterial({ color: accent }));
    ring.rotation.x = -Math.PI / 2; ring.position.y = 0.5;
    parent.add(ring);
    const pl = new THREE.PointLight(0xbfd8f0, 0.4, BRIDGE_ROOM_R * 2.5);
    pl.position.set(0, WALL_H - 10, 0);
    parent.add(pl);
  }

  function makeSign(text, sub, w, h, accent) {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 192;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#04141c'; ctx.fillRect(0, 0, 512, 192);
    ctx.strokeStyle = '#' + accent.toString(16).padStart(6,'0'); ctx.lineWidth = 5; ctx.strokeRect(4, 4, 504, 184);
    ctx.fillStyle = '#' + accent.toString(16).padStart(6,'0');
    ctx.font = 'bold 44px Consolas, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, 256, 70);
    if (sub) {
      ctx.fillStyle = '#5ab4e8';
      ctx.font = '24px Consolas, monospace';
      ctx.fillText(sub, 256, 130);
    }
    const tex = new THREE.CanvasTexture(c);
    return new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({ map: tex }));
  }

  // ============ BRIDGE ROOM ============
  bridgeRoomGroup = new THREE.Group();
  deckGroup.add(bridgeRoomGroup);
  buildRoundRoom(bridgeRoomGroup, 0x16222e, 0x00ffcc);

  // Big wraparound viewscreen across the front of the room (~3x the old size)
  {
    const c = document.createElement('canvas');
    c.width = 2048; c.height = 320;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#020810'; ctx.fillRect(0, 0, 2048, 320);
    // starfield
    ctx.fillStyle = '#dfe9ff';
    for (let i = 0; i < 400; i++) ctx.fillRect(Math.random() * 2048, Math.random() * 220, 2, 2);
    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 6; ctx.strokeRect(4, 4, 2040, 312);
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 70px Consolas, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('BRIDGE — MAIN VIEWSCREEN', 1024, 90);

    const SEG = 11;
    for (let i = 0; i < SEG; i++) {
      const t0 = -SCREEN_ARC_HALF + (i / SEG) * 2 * SCREEN_ARC_HALF;
      const t1 = -SCREEN_ARC_HALF + ((i + 1) / SEG) * 2 * SCREEN_ARC_HALF;
      const tm = (t0 + t1) / 2;
      const w = 2 * SCREEN_R * Math.sin((t1 - t0) / 2);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.repeat.set(1 / SEG, 1);
      tex.offset.set(i / SEG, 0);
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, SCREEN_H), new THREE.MeshBasicMaterial({ map: tex }));
      mesh.position.set(SCREEN_R * Math.sin(tm), SCREEN_H / 2 + 5, -SCREEN_R * Math.cos(tm));
      mesh.rotation.y = -tm;
      bridgeRoomGroup.add(mesh);
    }
  }

  // One long curved control panel facing the viewscreen — no individual screens
  {
    const SEATS = BRIDGE_STATIONS.length + 1; // stations + captain
    for (let i = 0; i < SEATS; i++) {
      const t0 = -PANEL_ARC_HALF + (i / SEATS) * 2 * PANEL_ARC_HALF;
      const t1 = -PANEL_ARC_HALF + ((i + 1) / SEATS) * 2 * PANEL_ARC_HALF;
      const tm = (t0 + t1) / 2;
      const w = 2 * PANEL_R * Math.sin((t1 - t0) / 2) - 4;
      const px = PANEL_R * Math.sin(tm), pz = -PANEL_R * Math.cos(tm);
      const pg = new THREE.Group();
      pg.position.set(px, 0, pz);
      pg.rotation.y = -tm;
      addBox(pg, w, 6, 36, 0, 28, 0, matDesk);     // countertop
      addBox(pg, w - 4, 2, 2, 0, 31, -17, matGlowC); // front edge glow strip
      addBox(pg, w - 4, 22, 4, 0, 14, 16, matDesk);  // back support
      bridgeRoomGroup.add(pg);

      // Chair on the near side of the panel, facing outward toward the screen
      const cx = (PANEL_R - 55) * Math.sin(tm), cz = -(PANEL_R - 55) * Math.cos(tm);
      if (i % 2 === 0) {
        const ch = makePiece(bridgeRoomGroup, buildChair, cx, 0, cz);
        ch.rotation.y = -tm + Math.PI;
        ch.scale.set(0.6, 0.6, 0.6);
        ch.traverse(o => {
          if (o.isMesh && (o.material === matChair || o.material === matDesk)) {
            o.material = o.material.clone();
            o.material.color.setHex(0x6fa8d8);
          }
        });
        extraEditables.push(ch);
      }

    }
  }

 // ============ ENGINE ROOM (same footprint, toggled) ============
  engineRoomGroup = new THREE.Group();
  engineRoomGroup.visible = false;
  deckGroup.add(engineRoomGroup);

  buildRoundRoom(engineRoomGroup, 0x241a16, 0xff6622);

  // ============ WALL ELEVATOR CABIN (BRIDGE + ENGINE) ============
  const EL_THICK = 8;
  const EL_H = WALL_H;        // cab height matches room wall/ceiling
  const CAB_W = 120;          // cab width (x)
  const CAB_D = 140;          // cab depth (z)

  const elevatorGroup = new THREE.Group();
  elevatorGroup.position.set(0, 0, BRIDGE_ROOM_R); // door sits flush with the round wall
  deckGroup.add(elevatorGroup);

  // Floor & ceiling — cab body sits behind the door, embedded in the wall
  addBox(elevatorGroup, CAB_W, 8, CAB_D, 0, 4, CAB_D/2, matGlow);
  addBox(elevatorGroup, CAB_W, 2, CAB_D, 0, EL_H - 1, CAB_D/2, matHullDk);

  // Back wall (far end of the cab)
  addBox(elevatorGroup, CAB_W, EL_H, EL_THICK, 0, EL_H/2, CAB_D, matHullDk);
  // Side walls
  addBox(elevatorGroup, EL_THICK, EL_H, CAB_D, -CAB_W/2, EL_H/2, CAB_D/2, matHullDk);
  addBox(elevatorGroup, EL_THICK, EL_H, CAB_D,  CAB_W/2, EL_H/2, CAB_D/2, matHullDk);

  // Front wall (room-facing) with sliding-door cutout
  const wallW = CAB_W;
  const sideW = (wallW - EL_DW * 2) / 2;

  const doorFace = new THREE.Group();
  elevatorGroup.add(doorFace);

  addBox(doorFace, sideW, EL_H, EL_THICK, -(EL_DW + sideW/2), EL_H/2, 0, matHullDk);
  addBox(doorFace, sideW, EL_H, EL_THICK,  (EL_DW + sideW/2), EL_H/2, 0, matHullDk);
  addBox(doorFace, wallW, EL_H - EL_DH, EL_THICK, 0, EL_DH + (EL_H - EL_DH)/2, 0, matHullDk);

  const pL = new THREE.Mesh(new THREE.BoxGeometry(EL_DW, EL_DH, EL_THICK), matDoor);
  pL.position.set(-EL_DW/2, EL_DH/2, 0);
  doorFace.add(pL);

  const pR = new THREE.Mesh(new THREE.BoxGeometry(EL_DW, EL_DH, EL_THICK), matDoor);
  pR.position.set( EL_DW/2, EL_DH/2, 0);
  doorFace.add(pR);

  elDoors.push({
    panelL: pL,
    panelR: pR,
    openT: 0,
    target: 0,
    worldX: 0,
    worldZ: BRIDGE_ROOM_R,
    exitDir: 0
  });

  // ===== ORIGINAL ENGINE ROOM CONTENT CONTINUES =====

  const core = new THREE.Mesh(new THREE.CylinderGeometry(50, 70, WALL_H * 1.3, 24), new THREE.MeshBasicMaterial({ color: 0xff6622 }));
  core.position.set(0, WALL_H * 0.65, 0);
  engineRoomGroup.add(core);

  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(60 + i * 16, 3, 8, 32), new THREE.MeshBasicMaterial({ color: 0xffaa33 }));
    ring.position.set(0, 25 + i * 30, 0);
    ring.rotation.x = Math.PI / 2;
    engineRoomGroup.add(ring);
  }

  const engineLight = new THREE.PointLight(0xff6622, 1.0, 700);
  engineLight.position.set(0, 60, 0);
  engineRoomGroup.add(engineLight);

  doorsByDeck[deckIndex] = doors;  

  elDoorsByDeck[deckIndex] = elDoors;
  innerDoorsByDeck[deckIndex] = innerDoors;
  hubWallsByDeck[deckIndex] = hubWalls;
  deckGroups[deckIndex] = deckGroup;
}

function buildDeck(deckIndex) {
  if (deckIndex === BRIDGE_DECK_INDEX) { buildBridgeDeck(deckIndex); return; }
  const deckGroup = new THREE.Group();
  deckGroup.position.y = -deckIndex * DECK_HEIGHT;
  deckGroup.userData.deckIndex = deckIndex;
  scene.add(deckGroup);
  const doors = [], elDoors = [], innerDoors = [], hubWalls = [];

  // FLOOR & CEILING rings
  const floorGeo = new THREE.RingGeometry(R_IN - ROOM_DEPTH - 30, R_OUT + 30, 192, 1);
  const floor = new THREE.Mesh(floorGeo, matFloor);
  floor.rotation.x = -Math.PI / 2;
  deckGroup.add(floor);

  const ceil = new THREE.Mesh(floorGeo.clone(), matCeil);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = WALL_H;
  deckGroup.add(ceil);

  const stripGeo = new THREE.RingGeometry(1488, 1512, 128, 1);
  const strip = new THREE.Mesh(stripGeo, matGlow);
  strip.rotation.x = Math.PI / 2;
  strip.position.y = WALL_H - 0.5;
  deckGroup.add(strip);

  const guideGeo = new THREE.RingGeometry(1496, 1504, 128, 1);
  const guide = new THREE.Mesh(guideGeo, new THREE.MeshBasicMaterial({ color: 0x2f6f9f }));
  guide.rotation.x = -Math.PI / 2;
  guide.position.y = 0.3;
  deckGroup.add(guide);

  // OUTER HULL with windows
  const SEG = 96;
  const segAng = Math.PI * 2 / SEG;
  const panelW = 2 * R_OUT * Math.tan(segAng / 2) + 2;
  for (let i = 0; i < SEG; i++) {
    const a = i * segAng + segAng / 2;
    const g = new THREE.Group();
    g.position.set(Math.cos(a) * R_OUT, 0, Math.sin(a) * R_OUT);
    g.rotation.y = Math.PI / 2 - a;
    if (i % 2 === 0) {
      addBox(g, panelW, 35, 14, 0, 17.5, 0, matHull);
      addBox(g, panelW, WALL_H - 95, 14, 0, (WALL_H + 95) / 2, 0, matHull);
      addBox(g, panelW * 0.16, 60, 14, -panelW * 0.42, 65, 0, matHullDk);
      addBox(g, panelW * 0.16, 60, 14,  panelW * 0.42, 65, 0, matHullDk);
      addBox(g, panelW * 0.70, 4, 16, 0, 35, 0, matTrim);
      addBox(g, panelW * 0.70, 4, 16, 0, 95, 0, matTrim);
      const glass = new THREE.Mesh(new THREE.PlaneGeometry(panelW * 0.68, 60), matGlass);
      glass.position.set(0, 65, 0);
      glass.rotation.y = Math.PI;
      g.add(glass);
    } else {
      addBox(g, panelW, WALL_H, 14, 0, WALL_H / 2, 0, matHull);
      addBox(g, panelW * 0.08, WALL_H, 18, 0, WALL_H / 2, -1, matHullDk);
    }
    deckGroup.add(g);
  }

  // 12 slot angles: hub at indices 0,3,6,9
  const slotAng = Math.PI * 2 / TOTAL_SLOTS;
  const allAngles = [];
  for (let i = 0; i < TOTAL_SLOTS; i++) allAngles.push(i * slotAng);

  // INNER WALL — skip near all 12 door slots
  const ISEG = 192;
  const iAng = Math.PI * 2 / ISEG;
  const iPanelW = 2 * R_IN * Math.tan(iAng / 2) + 2;

  for (let i = 0; i < ISEG; i++) {
    const a = i * iAng + iAng / 2;
    let nearDoor = false;
    for (const da of allAngles) {
      const diff = Math.abs(((a - da + Math.PI) % (Math.PI * 2)) - Math.PI);
      if (diff * R_IN < DOOR_HALF + iPanelW / 2) { nearDoor = true; break; }
    }
    const g = new THREE.Group();
    g.position.set(Math.cos(a) * R_IN, 0, Math.sin(a) * R_IN);
    g.rotation.y = Math.PI / 2 - a;
    if (nearDoor) {
      addBox(g, iPanelW, WALL_H - 95, 14, 0, (WALL_H + 95) / 2, 0, matHull);
    } else {
      addBox(g, iPanelW, WALL_H, 14, 0, WALL_H / 2, 0, matHull);
      if (i % 4 === 0) addBox(g, iPanelW * 0.1, WALL_H, 18, 0, WALL_H / 2, 1, matHullDk);
    }
    deckGroup.add(g);
  }

  // DOORS & ROOMS
  let roomNum = 0;
  for (let idx = 0; idx < TOTAL_SLOTS; idx++) {
    const a = allAngles[idx];
    const isHubDoor = (idx % 3 === 0);

    const g = new THREE.Group();
    g.position.set(Math.cos(a) * R_IN, 0, Math.sin(a) * R_IN);
    g.rotation.y = Math.PI / 2 - a;
    deckGroup.add(g);

    // door frame
    addBox(g, 12, 95, 20, -(DOOR_HALF + 6), 47.5, 0, matTrim);
    addBox(g, 12, 95, 20,  (DOOR_HALF + 6), 47.5, 0, matTrim);
    addBox(g, DOOR_HALF * 2 + 24, 8, 20, 0, 99, 0, matTrim);

    if (!isHubDoor) {
      const panelL = new THREE.Mesh(new THREE.BoxGeometry(DOOR_HALF, 95, 8), matDoor);
      panelL.position.set(-DOOR_HALF / 2, 47.5, 0);
      g.add(panelL);
      const panelR = new THREE.Mesh(new THREE.BoxGeometry(DOOR_HALF, 95, 8), matDoor);
      panelR.position.set(DOOR_HALF / 2, 47.5, 0);
      g.add(panelR);
      const seam = new THREE.Mesh(new THREE.BoxGeometry(2, 90, 9), matGlow);
      seam.position.set(0, 47.5, 0);
      g.add(seam);
      doors.push({ group: g, panelL, panelR, seam, angle: a, openT: 0, target: 0 });

      // Door number sign — panel on inner wall above door, facing corridor
      roomNum++;
      const sc = document.createElement('canvas');
      sc.width = 512; sc.height = 256;
      const sctx = sc.getContext('2d');
      sctx.fillStyle = '#060f1a';
      sctx.fillRect(0, 0, 512, 256);
      sctx.strokeStyle = '#4a9fd8';
      sctx.lineWidth = 4;
      sctx.strokeRect(4, 4, 504, 248);
      sctx.fillStyle = '#5ab4e8';
      sctx.font = 'bold 60px Consolas, monospace';
      sctx.textAlign = 'center';
      sctx.textBaseline = 'middle';
      if (deckIndex === BRIDGE_DECK_INDEX) {
        sctx.fillText('BRIDGE', 256, 80);
        sctx.fillStyle = '#ffffff';
        sctx.font = 'bold 60px Consolas, monospace';
        sctx.fillText(BRIDGE_STATIONS[(roomNum - 1) % BRIDGE_STATIONS.length], 256, 180);
      } else {
        sctx.fillText('DECK ' + DECK_LETTERS[deckIndex], 256, 80);
        sctx.fillStyle = '#ffffff';
        sctx.font = 'bold 110px Consolas, monospace';
        sctx.fillText('ROOM ' + roomNum, 256, 180);
      }
      const stex = new THREE.CanvasTexture(sc);
      const smat = new THREE.MeshBasicMaterial({ map: stex, transparent: true });
      const ssign = new THREE.Mesh(new THREE.PlaneGeometry((DOOR_HALF * 2 + 16) / 2, 14), smat);
      ssign.position.set(0, 113, 12);
      g.add(ssign);
    }

    // room
    const rg = new THREE.Group();
    g.add(rg);

    // Per-room accent color (rooms 1-8 get distinct tints)
    const matRoomThis = isHubDoor ? matRoom : matRoom.clone();
    if (!isHubDoor) {
      matRoomThis.color.setHex(deckIndex === BRIDGE_DECK_INDEX ? 0x16222e : ROOM_COLORS[(roomNum - 1) % ROOM_COLORS.length]);
    }

    // How far inward the curved inner wall recedes at x=±ROOM_HALF
    const sideInset = ROOM_HALF < R_IN
      ? R_IN - Math.sqrt(R_IN * R_IN - ROOM_HALF * ROOM_HALF)
      : 0;
    const sideStart = -(sideInset + 8);
    const sideDepth = ROOM_DEPTH - sideInset - 8;

    // floor & ceiling — keep shared material to avoid z-fighting with corridor floor/ceiling
    addBox(rg, ROOM_HALF * 2 + 20, 4, ROOM_DEPTH, 0, -2,         -ROOM_DEPTH / 2, matRoom);
    addBox(rg, ROOM_HALF * 2 + 20, 4, ROOM_DEPTH, 0, WALL_H + 2, -ROOM_DEPTH / 2, matRoom);
    // back wall
    addBox(rg, ROOM_HALF * 2 + 20, WALL_H, 10, 0, WALL_H / 2, -ROOM_DEPTH, matRoomThis);
    // side walls — inset so they don't pierce the corridor
    addBox(rg, 10, WALL_H, sideDepth, -(ROOM_HALF + 5), WALL_H / 2, sideStart - sideDepth / 2, matRoomThis);
    addBox(rg, 10, WALL_H, sideDepth,  (ROOM_HALF + 5), WALL_H / 2, sideStart - sideDepth / 2, matRoomThis);
    // angled corner panels bridging doorframe to side wall
    const diagLen = Math.sqrt((ROOM_HALF - DOOR_HALF) ** 2 + (sideInset + 8) ** 2) + 4;
    const cAngle  = Math.atan2(sideInset + 8, ROOM_HALF - DOOR_HALF);
    [-1, 1].forEach(side => {
      const cx = side * (DOOR_HALF + (ROOM_HALF - DOOR_HALF) / 2);
      const cz = -(sideInset + 8) / 2;
      const corner = new THREE.Mesh(new THREE.BoxGeometry(diagLen, WALL_H, 10), matRoomThis);
      corner.position.set(cx, WALL_H / 2, cz);
      corner.rotation.y = side * cAngle;
      rg.add(corner);
    });
    // lintel above doorway
    addBox(rg, DOOR_HALF * 2, WALL_H - 95, 10, 0, 95 + (WALL_H - 95) / 2, -5, matRoomThis);
    const rl = new THREE.PointLight(0xbfd8f0, 0.18, 600);
    rl.position.set(0, 90, -ROOM_DEPTH / 2);
    rg.add(rl);
    const rl2 = new THREE.PointLight(0xbfd8f0, 0.15, 500);
    rl2.position.set(0, 90, -ROOM_DEPTH * 0.2);
    rg.add(rl2);
    const rl3 = new THREE.PointLight(0xbfd8f0, 0.15, 500);
    rl3.position.set(0, 90, -ROOM_DEPTH * 0.8);
    rg.add(rl3);
    const rlamp = new THREE.Mesh(new THREE.BoxGeometry(40, 2, 40), matGlow);
    rlamp.position.set(0, WALL_H - 2, -ROOM_DEPTH / 2);
    rg.add(rlamp);
    const rlamp2 = new THREE.Mesh(new THREE.BoxGeometry(30, 2, 30), matGlow);
    rlamp2.position.set(0, WALL_H - 2, -ROOM_DEPTH * 0.2);
    rg.add(rlamp2);
    const rlamp3 = new THREE.Mesh(new THREE.BoxGeometry(30, 2, 30), matGlow);
    rlamp3.position.set(0, WALL_H - 2, -ROOM_DEPTH * 0.8);
    rg.add(rlamp3);

    if (!isHubDoor) {
      const PART_Z   = -ROOM_DEPTH / 2;
      const BACK_D   = ROOM_DEPTH / 2;

      if (deckIndex === BRIDGE_DECK_INDEX) {
        buildBridgeStation(rg, roomNum);
      } else {
      // Partition wall and sliding doors only — no furniture
      const PW       = 8;
      const DIV_X    = 0;
      const DOOR_W   = 40;

      const matPanel     = new THREE.MeshStandardMaterial({ color: 0x0e1a24, metalness: 0.65, roughness: 0.45 });
      const matGlowB     = new THREE.MeshBasicMaterial({ color: 0x0055ff });
      const matGlowA     = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
      const matDoorSlide = new THREE.MeshStandardMaterial({ color: 0x1a3044, metalness: 0.8, roughness: 0.25 });

      const bedDoorX  = -ROOM_HALF / 2;
      const bathDoorX =  ROOM_HALF / 2;

      // Partition wall pieces
      const lw1 = (bedDoorX - DOOR_W) - (-ROOM_HALF);
      addBox(rg, lw1, WALL_H, PW, -ROOM_HALF + lw1/2, WALL_H/2, PART_Z, matPanel);
      const cw = (bathDoorX - DOOR_W) - (bedDoorX + DOOR_W);
      addBox(rg, cw, WALL_H, PW, bedDoorX + DOOR_W + cw/2, WALL_H/2, PART_Z, matPanel);
      const rw1 = ROOM_HALF - (bathDoorX + DOOR_W);
      addBox(rg, rw1, WALL_H, PW, bathDoorX + DOOR_W + rw1/2, WALL_H/2, PART_Z, matPanel);
      addBox(rg, DOOR_W*2, WALL_H-95, PW, bedDoorX,  95+(WALL_H-95)/2, PART_Z, matPanel);
      addBox(rg, DOOR_W*2, WALL_H-95, PW, bathDoorX, 95+(WALL_H-95)/2, PART_Z, matPanel);
      addBox(rg, ROOM_HALF*2, 3, 3, 0, 97, PART_Z+5, matGlowB);

      // Sliding door panels — closed by default, auto-open on proximity
      const bdL = new THREE.Mesh(new THREE.BoxGeometry(DOOR_W, 92, 6), matDoorSlide);
      bdL.position.set(bedDoorX - DOOR_W/2, 46, PART_Z); rg.add(bdL);
      const bdR = new THREE.Mesh(new THREE.BoxGeometry(DOOR_W, 92, 6), matDoorSlide);
      bdR.position.set(bedDoorX + DOOR_W/2, 46, PART_Z); rg.add(bdR);
      const btL = new THREE.Mesh(new THREE.BoxGeometry(DOOR_W, 92, 6), matDoorSlide);
      btL.position.set(bathDoorX - DOOR_W/2, 46, PART_Z); rg.add(btL);
      const btR = new THREE.Mesh(new THREE.BoxGeometry(DOOR_W, 92, 6), matDoorSlide);
      btR.position.set(bathDoorX + DOOR_W/2, 46, PART_Z); rg.add(btR);

      // Register for proximity auto-open animation
      innerDoors.push({ panelL: bdL, panelR: bdR, centerX: bedDoorX,  slideW: DOOR_W, openT: 0, angle: a, partZ: PART_Z });
      innerDoors.push({ panelL: btL, panelR: btR, centerX: bathDoorX, slideW: DOOR_W, openT: 0, angle: a, partZ: PART_Z });

      // Door frame glow strips
      addBox(rg, 4, 95, 8, bedDoorX  - DOOR_W - 2, 47, PART_Z, matGlowB);
      addBox(rg, 4, 95, 8, bedDoorX  + DOOR_W + 2, 47, PART_Z, matGlowB);
      addBox(rg, 4, 95, 8, bathDoorX - DOOR_W - 2, 47, PART_Z, matGlowA);
      addBox(rg, 4, 95, 8, bathDoorX + DOOR_W + 2, 47, PART_Z, matGlowA);

      // Centre divider between bedroom and bathroom
      addBox(rg, PW, WALL_H, BACK_D, DIV_X, WALL_H/2, PART_Z - BACK_D/2, matPanel);
      addBox(rg, 2, WALL_H, BACK_D, DIV_X - 5, WALL_H/2, PART_Z - BACK_D/2, matGlowB);
      addBox(rg, 2, WALL_H, BACK_D, DIV_X + 5, WALL_H/2, PART_Z - BACK_D/2, matGlowA);

      // Room lights only
      const ll = new THREE.PointLight(0x4488ff, 0.15, 600);
      ll.position.set(0, WALL_H-10, -ROOM_DEPTH/4); rg.add(ll);
      const bl = new THREE.PointLight(0x2255ff, 0.12, 300);
      bl.position.set(-ROOM_HALF/2, WALL_H-10, PART_Z - BACK_D/2); rg.add(bl);
      const tl = new THREE.PointLight(0x00ddaa, 0.12, 300);
      tl.position.set(ROOM_HALF/2, WALL_H-10, PART_Z - BACK_D/2); rg.add(tl);

      // Furniture
      buildRoomFurniture(rg, roomNum, PART_Z, BACK_D, deckIndex);
      }
    }

    if (isHubDoor) {
      rg.visible = false;
      const ec = document.createElement('canvas');
      ec.width = 256; ec.height = 64;
      const ectx = ec.getContext('2d');
      ectx.fillStyle = '#1a2a3a';
      ectx.fillRect(0, 0, 256, 64);
      ectx.strokeStyle = '#4a9fd8';
      ectx.lineWidth = 3;
      ectx.strokeRect(2, 2, 252, 60);
      ectx.fillStyle = '#9fd8ff';
      ectx.font = 'bold 20px Consolas, monospace';
      ectx.textAlign = 'center';
      ectx.textBaseline = 'middle';
      ectx.fillText('▲ ELEVATOR — DECK ' + DECK_LETTERS[deckIndex], 128, 32);
      const etex = new THREE.CanvasTexture(ec);
      const emat = new THREE.MeshBasicMaterial({ map: etex, transparent: true, side: THREE.DoubleSide });
      const esign = new THREE.Mesh(new THREE.PlaneGeometry(DOOR_HALF * 1.4, 8.4), emat);
      esign.position.set(0, 103, 11);
      g.add(esign);
    }
  }

  // HUB
  function addHubBox(w, h, d, x, y, z, mat) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    deckGroup.add(m);
    return m;
  }

  addHubBox(HUB_SIZE, 4, HUB_SIZE, 0, 0, 0, matFloor);
  addHubBox(HUB_SIZE, 4, HUB_SIZE, 0, WALL_H, 0, matCeil);
  addHubBox(HUB_CORRIDOR_W, 4, HUB_ARM_LEN, 0, 0, -(HUB_HALF + HUB_ARM_LEN / 2), matFloor);
  addHubBox(HUB_CORRIDOR_W, 4, HUB_ARM_LEN, 0, WALL_H, -(HUB_HALF + HUB_ARM_LEN / 2), matCeil);
  addHubBox(HUB_CORRIDOR_W, 4, HUB_ARM_LEN, 0, 0,  (HUB_HALF + HUB_ARM_LEN / 2), matFloor);
  addHubBox(HUB_CORRIDOR_W, 4, HUB_ARM_LEN, 0, WALL_H,  (HUB_HALF + HUB_ARM_LEN / 2), matCeil);
  addHubBox(HUB_ARM_LEN, 4, HUB_CORRIDOR_W, -(HUB_HALF + HUB_ARM_LEN / 2), 0, 0, matFloor);
  addHubBox(HUB_ARM_LEN, 4, HUB_CORRIDOR_W, -(HUB_HALF + HUB_ARM_LEN / 2), WALL_H, 0, matCeil);
  addHubBox(HUB_ARM_LEN, 4, HUB_CORRIDOR_W,  (HUB_HALF + HUB_ARM_LEN / 2), 0, 0, matFloor);
  addHubBox(HUB_ARM_LEN, 4, HUB_CORRIDOR_W,  (HUB_HALF + HUB_ARM_LEN / 2), WALL_H, 0, matCeil);

  function makeHubWall(w, h, d, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matHull.clone());
    m.position.set(x, y, z);
    deckGroup.add(m);
    hubWalls.push(m);
    return m;
  }

  makeHubWall(HUB_WALL, WALL_H, HUB_ARM_LEN, -HUB_CORRIDOR_HALF, WALL_H/2, -(HUB_HALF + HUB_ARM_LEN/2));
  makeHubWall(HUB_WALL, WALL_H, HUB_ARM_LEN,  HUB_CORRIDOR_HALF, WALL_H/2, -(HUB_HALF + HUB_ARM_LEN/2));
  makeHubWall(HUB_WALL, WALL_H, HUB_ARM_LEN, -HUB_CORRIDOR_HALF, WALL_H/2,  (HUB_HALF + HUB_ARM_LEN/2));
  makeHubWall(HUB_WALL, WALL_H, HUB_ARM_LEN,  HUB_CORRIDOR_HALF, WALL_H/2,  (HUB_HALF + HUB_ARM_LEN/2));
  makeHubWall(HUB_ARM_LEN, WALL_H, HUB_WALL, -(HUB_HALF + HUB_ARM_LEN/2), WALL_H/2, -HUB_CORRIDOR_HALF);
  makeHubWall(HUB_ARM_LEN, WALL_H, HUB_WALL, -(HUB_HALF + HUB_ARM_LEN/2), WALL_H/2,  HUB_CORRIDOR_HALF);
  makeHubWall(HUB_ARM_LEN, WALL_H, HUB_WALL,  (HUB_HALF + HUB_ARM_LEN/2), WALL_H/2, -HUB_CORRIDOR_HALF);
  makeHubWall(HUB_ARM_LEN, WALL_H, HUB_WALL,  (HUB_HALF + HUB_ARM_LEN/2), WALL_H/2,  HUB_CORRIDOR_HALF);

  const cornerSize = HUB_HALF - HUB_CORRIDOR_HALF;
  const cornerPos  = HUB_CORRIDOR_HALF + cornerSize / 2;
  addHubBox(cornerSize, WALL_H, cornerSize,  cornerPos, WALL_H/2,  cornerPos, matHullDk);
  addHubBox(cornerSize, WALL_H, cornerSize, -cornerPos, WALL_H/2,  cornerPos, matHullDk);
  addHubBox(cornerSize, WALL_H, cornerSize,  cornerPos, WALL_H/2, -cornerPos, matHullDk);
  addHubBox(cornerSize, WALL_H, cornerSize, -cornerPos, WALL_H/2, -cornerPos, matHullDk);


// ONE RING ELEVATOR ON EVERY NON-BRIDGE DECK
  const elevatorGroup = new THREE.Group();
  elevatorGroup.visible = false;
  deckGroup.add(elevatorGroup);

  const EL_THICK = 8;
  const EL_H = WALL_H * 3;
  const wallW = EL_HALF * 2;
  const sideW = (wallW - EL_DW * 2) / 2;

  function makeElevatorLabel() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a2a3a'; ctx.fillRect(0, 0, 256, 64);
    ctx.strokeStyle = '#4a9fd8'; ctx.lineWidth = 3; ctx.strokeRect(2, 2, 252, 60);
    ctx.fillStyle = '#9fd8ff';
    ctx.font = 'bold 20px Consolas, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▲ ELEVATOR — DECK ' + DECK_LETTERS[deckIndex], 128, 32);
    return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true });
  }

  const matLabel = makeElevatorLabel();

  {
    const ringElevatorGroup = new THREE.Group();
    ringElevatorGroup.position.set(RING_EL_X, 0, 0);
    deckGroup.add(ringElevatorGroup);

    addBox(ringElevatorGroup, 72, 8, 72, 0, 4, 0, matGlow);
    addBox(ringElevatorGroup, 110, 2, 110, 0, WALL_H - 1, 0, matGlow);

    [
      { x: -EL_HALF, z: 0, ry: -Math.PI/2 },
      { x:  EL_HALF, z: 0, ry:  Math.PI/2 },
    ].forEach(({ x, z, ry }) => {
      const sg = new THREE.Group();
      sg.position.set(x, 0, z);
      sg.rotation.y = ry;
      ringElevatorGroup.add(sg);

      addBox(sg, sideW, EL_H, EL_THICK, -(EL_DW + sideW/2), EL_H/2, 0, matHullDk);
      addBox(sg, sideW, EL_H, EL_THICK,  (EL_DW + sideW/2), EL_H/2, 0, matHullDk);
      addBox(sg, wallW, EL_H - EL_DH, EL_THICK, 0, EL_DH + (EL_H - EL_DH)/2, 0, matHullDk);
      addBox(sg, 6, EL_DH, EL_THICK+4, -(EL_DW+3), EL_DH/2, 0, matTrim);
      addBox(sg, 6, EL_DH, EL_THICK+4,  (EL_DW+3), EL_DH/2, 0, matTrim);
      addBox(sg, EL_DW*2+12, 6, EL_THICK+4, 0, EL_DH+3, 0, matTrim);

      const sign = new THREE.Mesh(new THREE.PlaneGeometry(EL_DW * 2 + 8, 16), matLabel);
      sign.position.set(0, EL_DH + 16, EL_THICK + 4);
      sign.rotation.y = Math.PI;
      sg.add(sign);

      const pL = new THREE.Mesh(new THREE.BoxGeometry(EL_DW, EL_DH, EL_THICK), matDoor);
      pL.position.set(-EL_DW/2, EL_DH/2, 0);
      sg.add(pL);

      const pR = new THREE.Mesh(new THREE.BoxGeometry(EL_DW, EL_DH, EL_THICK), matDoor);
      pR.position.set( EL_DW/2, EL_DH/2, 0);
      sg.add(pR);

      elDoors.push({
        panelL: pL,
        panelR: pR,
        openT: 0,
        target: 0,
        worldX: RING_EL_X + x,
        worldZ: z,
        exitDir: ry
      });
    });
  }

  addHubBox(16, 2, R_IN * 2, 0, WALL_H - 3, 0, matGlow);  
 addHubBox(16, 2, R_IN * 2, 0, WALL_H - 3, 0, matGlow);
  addHubBox(R_IN * 2, 2, 16, 0, WALL_H - 3, 0, matGlow);
  const matGuide = new THREE.MeshBasicMaterial({ color: DECK_GUIDE_COLORS[deckIndex % DECK_GUIDE_COLORS.length] });
  addHubBox(4, 1, R_IN * 2, 0, 3, 0, matGuide);
  addHubBox(R_IN * 2, 1, 4, 0, 3, 0, matGuide);

  doorsByDeck[deckIndex] = doors;
  elDoorsByDeck[deckIndex] = elDoors;
  innerDoorsByDeck[deckIndex] = innerDoors;
  hubWallsByDeck[deckIndex] = hubWalls;
  deckGroups[deckIndex] = deckGroup;
}

  // Build all 10 decks (A-J), stacked below Deck A
  for (let di = 0; di < DECK_LETTERS.length; di++) buildDeck(di);

  // Activate Deck A (index 0) by default
  doors      = doorsByDeck[0];
  elDoors    = elDoorsByDeck[0];
  innerDoors = innerDoorsByDeck[0];
  hubWalls   = hubWallsByDeck[0];
  for (let di = 1; di < deckGroups.length; di++) deckGroups[di].visible = false;

  buildStars();
  buildPlanet();

  // Now populate furniture into rooms (materials are ready)
  for (const entry of _pendingFurniture) {
    buildRoomFurniture(entry.rg, entry.roomNum, entry.PART_Z, entry.BACK_D, entry.deckIndex);
  }
  _pendingFurniture = null;

  // Now that all rooms are built, apply room1's layout to every room
  syncRoomsToRoom1();

  document.getElementById('start').addEventListener('click', () => {
    document.getElementById('start').style.display = 'none';
    gameStarted = true;
  });
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'KeyG') {
      const d = document.getElementById('debug');
      d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }
    if (e.code === 'KeyM') {
      furnitureEditMode = !furnitureEditMode;
      document.getElementById('fedit').style.display = furnitureEditMode ? 'block' : 'none';
      document.getElementById('fedit').textContent = '— FURNITURE EDIT — click a piece';
      if (!furnitureEditMode) {
        // Clean up ALL furniture meshes, not just selectedFurniture
        for (const fg of room1Furniture) {
          fg.traverse(o => {
            if (o.isMesh && o.userData._origMat) { o.material = o.userData._origMat; delete o.userData._origMat; }
          });
        }
        for (const fg of extraEditables) {
          fg.traverse(o => {
            if (o.isMesh && o.userData._origMat) { o.material = o.userData._origMat; delete o.userData._origMat; }
          });
        }
        selectedFurniture = null;
      }
    }
    if (e.code === 'KeyO') {
      toggleNearestDoor();
    }
  });
  document.addEventListener('keyup', e => keys[e.code] = false);

  document.addEventListener('click', e => {
    if (!gameStarted) return;
    if (furnitureEditMode) {
      const mouse = new THREE.Vector2(
        (e.clientX / innerWidth)  * 2 - 1,
       -(e.clientY / innerHeight) * 2 + 1
      );
      camera.updateMatrixWorld();
      _fRaycaster.setFromCamera(mouse, camera);
      const meshes = [];
      for (const fg of room1Furniture) fg.traverse(o => { if (o.isMesh) meshes.push(o); });
      for (const fg of extraEditables) fg.traverse(o => { if (o.isMesh) meshes.push(o); });
      const hits = _fRaycaster.intersectObjects(meshes, true);
      for (const fg of room1Furniture) {
        fg.traverse(o => {
          if (o.isMesh && o.userData._origMat) { o.material = o.userData._origMat; delete o.userData._origMat; }
        });
      }
      for (const fg of extraEditables) {
        fg.traverse(o => {
          if (o.isMesh && o.userData._origMat) { o.material = o.userData._origMat; delete o.userData._origMat; }
        });
      }
      selectedFurniture = null;
      document.getElementById('fedit').textContent = '— FURNITURE EDIT — meshes:' + meshes.length + ' hits:' + hits.length + ' click piece to select';
      if (!hits.length) return;
      let obj = hits[0].object;
      while (obj && obj.parent) {
        if (room1Furniture.includes(obj) || extraEditables.includes(obj)) { selectedFurniture = obj; break; }
        obj = obj.parent;
      }
      if (selectedFurniture) {
        const sel = matSelectW.clone();
        selectedFurniture.traverse(o => {
          if (o.isMesh) { o.userData._origMat = o.material; o.material = sel; }
        });
        document.getElementById('fedit').textContent = '— SELECTED — arrows=move  shift+\u2191\u2193=lift  shift+\u2190\u2192=rotate';
      }
    } else if (editMode) {
      _raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const hits = _raycaster.intersectObjects(hubWalls);
      if (hits.length > 0) {
        if (selectedWallMesh && selectedWallMesh.material.emissive) selectedWallMesh.material.emissive.set(0x000000);
        selectedWallMesh = hits[0].object;
        if (selectedWallMesh.material.emissive) selectedWallMesh.material.emissive.set(0x334455);
        updateWallLabel();
      }
    }
  });

  // Furniture edit — keydown handler
  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      console.log('Arrow key pressed. furnitureEditMode:', furnitureEditMode, 'selectedFurniture:', selectedFurniture);
    }
    if (!furnitureEditMode || !selectedFurniture) return;
    if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) return;
    e.preventDefault();
    console.log('Moving furniture with', e.code);
    const speed = 5;
    const sh = e.shiftKey;
    if (sh) {
      if (e.code === 'ArrowUp')    selectedFurniture.position.y += speed;
      if (e.code === 'ArrowDown')  selectedFurniture.position.y -= speed;
      if (e.code === 'ArrowLeft')  selectedFurniture.rotation.y += 0.15;
      if (e.code === 'ArrowRight') selectedFurniture.rotation.y -= 0.15;
    } else {
      // Convert camera direction into room-local space so movement is straight
      const fwdW   = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); fwdW.y = 0; fwdW.normalize();
      const rightW = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);  rightW.y = 0; rightW.normalize();
      const parent = selectedFurniture.parent;
      if (parent) {
        const invQ = new THREE.Quaternion();
        parent.getWorldQuaternion(invQ); invQ.invert();
        fwdW.applyQuaternion(invQ);   fwdW.y = 0;   fwdW.normalize();
        rightW.applyQuaternion(invQ); rightW.y = 0; rightW.normalize();
      }
      if (e.code === 'ArrowUp')    { selectedFurniture.position.x += fwdW.x*speed;   selectedFurniture.position.z += fwdW.z*speed; }
      if (e.code === 'ArrowDown')  { selectedFurniture.position.x -= fwdW.x*speed;   selectedFurniture.position.z -= fwdW.z*speed; }
      if (e.code === 'ArrowLeft')  { selectedFurniture.position.x -= rightW.x*speed; selectedFurniture.position.z -= rightW.z*speed; }
      if (e.code === 'ArrowRight') { selectedFurniture.position.x += rightW.x*speed; selectedFurniture.position.z += rightW.z*speed; }
    }
    syncRoomsToRoom1();
    saveFurniture();
  });

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function buildRoomFurniture(rg, roomNum, PART_Z, BACK_D, deckIndex) {
  if (!matBed) { _pendingFurniture.push({ rg, roomNum, PART_Z, BACK_D, deckIndex }); return; }

  // Room layout:
  //   PART_Z = partition wall Z (=-320)  BACK_D=320  ROOM_HALF=200
  //   Bedroom: X < 0 (BX centre = -100)  depth: PART_Z to PART_Z-BACK_D
  //   Bathroom: X > 0 (TX centre = +100)  same depth
  //   Living area: between corridor door (Z=0) and partition (PART_Z=-320)

  const BX   = -ROOM_HALF / 2;   // bedroom centre X  = -100
  const TX   =  ROOM_HALF / 2;   // bathroom centre X =  100
  const BWALL = PART_Z - BACK_D; // back wall Z        = -640
  const BZ   = PART_Z - BACK_D / 2; // mid-depth Z    = -480

  // ── LIVING AREA (Z: 0 → PART_Z = -320) ──────────────────────────
  // Sofa facing inward near partition, coffee table, holo display on back wall of living area
  const sofa   = makePiece(rg, buildSofa,        0,   0, PART_Z + 55);
  sofa.rotation.y = Math.PI; // face toward door
  const coffee = makePiece(rg, buildCoffeeTable, 0,   0, PART_Z + 110);
  const holo   = makePiece(rg, buildHoloDisplay, 0,   0, PART_Z + 180);
  holo.rotation.y = Math.PI;

  // Replicator — right side of living area against outer wall
  const repl = makePiece(rg, buildReplicator, ROOM_HALF - 50, 0, PART_Z + 120);
  repl.rotation.y = -Math.PI / 2; // face inward

  // ── BEDROOM (X < 0, Z: PART_Z → BWALL) ──────────────────────────
  // Bed against left outer wall, head near back wall
  const bed   = makePiece(rg, buildBed,   BX,      0, BWALL + 75);
  bed.rotation.y = Math.PI / 2;

  // Desk + chair against back wall
  const desk  = makePiece(rg, buildDesk,  BX,      0, BWALL + 25);
  desk.rotation.y = Math.PI;
  const chair = makePiece(rg, buildChair, BX + 35, 0, BWALL + 55);

  // Locker bank on bedroom side of partition wall
  const lockers = makePiece(rg, buildLockerBank, BX, 0, PART_Z - 20);
  lockers.rotation.y = Math.PI;

  // Weapon rack mounted on left outer wall mid-room
  const rack = makePiece(rg, buildWeaponRack, -(ROOM_HALF - 6), 0, BZ);
  rack.rotation.y = Math.PI / 2;

  // ── BATHROOM (X > 0, Z: PART_Z → BWALL) ─────────────────────────
  // Shower in far back-right corner
  const shower  = makePiece(rg, buildShower,  TX + 30, 0, BWALL + 35);
  // Sink on right outer wall
  const sink    = makePiece(rg, buildSink,    TX + 40, 0, BZ + 40);
  sink.rotation.y = -Math.PI / 2;
  // Toilet near partition
  const toilet  = makePiece(rg, buildToilet,  TX + 20, 0, PART_Z - 40);
  const hottub  = makePiece(rg, buildHottub,  TX, 0, BWALL + 55);

  const pieces = [sofa, coffee, holo, repl, bed, desk, chair, lockers, rack, shower, sink, toilet, hottub];
  allRoomFurniture.push(pieces);
  if (!allRoomFurnitureByDeck[deckIndex]) allRoomFurnitureByDeck[deckIndex] = [];
  allRoomFurnitureByDeck[deckIndex].push(pieces);
  if (deckIndex === 0 && roomNum === 1) {
    room1Furniture = pieces;
    // Defer load to allow async GLB to load first
    setTimeout(() => loadFurniture(), 500);
  }
}

function saveFurniture() {
  const data = room1Furniture.map(fg => ({
    x: fg.position.x, y: fg.position.y, z: fg.position.z, ry: fg.rotation.y
  }));
  const extra = extraEditables.map((fg, i) => {
    console.log('Extra item', i, ':', fg.name || fg.constructor.name, 'pos:', fg.position.x.toFixed(1), fg.position.y.toFixed(1), fg.position.z.toFixed(1));
    return { x: fg.position.x, y: fg.position.y, z: fg.position.z, ry: fg.rotation.y };
  });
  console.log('Saving furniture:', data.length, 'standard,', extra.length, 'extra');
  try { localStorage.setItem('ironclad_furniture_v1', JSON.stringify({standard: data, extra})); } catch(e) { console.error('Save failed', e); }
}

function loadFurniture() {
  // Version bump: clear old saves so new layout takes effect
  const VERSION = 'v3';
  const vkey = 'ironclad_furniture_version';
  if (localStorage.getItem(vkey) !== VERSION) {
    localStorage.removeItem('ironclad_furniture_v1');
    localStorage.setItem(vkey, VERSION);
    return;
  }
  try {
    const raw = localStorage.getItem('ironclad_furniture_v1');
    if (!raw) return;
    const stored = JSON.parse(raw);
    // Handle both old array format and new object format
    const data = stored.standard || stored;
    const extra = stored.extra || [];
    if (data.length !== room1Furniture.length) return; // piece count changed, ignore save
    data.forEach((d, i) => {
      if (room1Furniture[i]) {
        room1Furniture[i].position.set(d.x, d.y, d.z);
        room1Furniture[i].rotation.y = d.ry;
      }
    });
    extra.forEach((d, i) => {
      if (extraEditables[i]) {
        extraEditables[i].position.set(d.x, d.y, d.z);
        extraEditables[i].rotation.y = d.ry;
      }
    });
    syncRoomsToRoom1();
  } catch(e) {}
}

function syncRoomsToRoom1() {
  if (!room1Furniture.length) return;
  for (let ri = 1; ri < allRoomFurniture.length; ri++) {
    for (let pi = 0; pi < room1Furniture.length && pi < allRoomFurniture[ri].length; pi++) {
      allRoomFurniture[ri][pi].position.copy(room1Furniture[pi].position);
      allRoomFurniture[ri][pi].rotation.y = room1Furniture[pi].rotation.y;
    }
  }
}

function buildStars() {
  const N = 5000, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 6000 + Math.random() * 3500;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(p) * Math.cos(t);
    pos[i*3+1] = r * Math.cos(p);
    pos[i*3+2] = r * Math.sin(p) * Math.sin(t);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xdfe9ff, size: 7, sizeAttenuation: true }));
  stars.name = 'stars';
  scene.add(stars);
}

function buildPlanet() {
  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(1400, 48, 48),
    new THREE.MeshStandardMaterial({ color: 0x3a6fa8, emissive: 0x16344f, roughness: 0.9 })
  );
  planet.position.set(5200, -800, 3800);
  scene.add(planet);
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(1460, 48, 48),
    new THREE.MeshBasicMaterial({ color: 0x6fb6ff, transparent: true, opacity: 0.08, side: THREE.BackSide })
  );
  glow.position.copy(planet.position);
  scene.add(glow);
}

function nearestDoor() {
  let best = null, bestD = 1e9;
  for (const d of doors) {
    const dx = camera.position.x - d.group.position.x;
    const dz = camera.position.z - d.group.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < bestD) { bestD = dist; best = d; }
  }
  return bestD < 180 ? best : null;
}

function nearestElDoor() {
  const centers = [{ x: 0, z: currentDeck === BRIDGE_DECK_INDEX ? BRIDGE_ELEV_Z : 0 }];
  if (currentDeck !== BRIDGE_DECK_INDEX) centers.push({ x: RING_EL_X, z: 0 });
  const inRange = centers.some(c => {
    const dx = camera.position.x - c.x, dz = camera.position.z - c.z;
    return Math.sqrt(dx*dx + dz*dz) <= EL_HALF + 300;
  });
  if (!inRange) return null;
  let best = null, bestD = 1e9;
  for (const ed of elDoors) {
    const dx = camera.position.x - ed.worldX;
    const dz = camera.position.z - ed.worldZ;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < bestD) { bestD = dist; best = ed; }
  }
  return bestD < 300 ? best : null;
}

function toggleNearestDoor() {
  const ned = nearestElDoor();
  if (ned) {
    ned.target = ned.target === 1 ? 0 : 1;
    // Orient camera to face exit direction when opening
    if (ned.target === 1) {
      camera.rotation.order = 'YXZ';
      camera.rotation.y = ned.exitDir;
    }
  }
}

function switchDeck(newDeck) {
  if (newDeck < 0 || newDeck >= DECK_LETTERS.length) return;
  currentDeck = newDeck;
  for (let i = 0; i < deckGroups.length; i++) deckGroups[i].visible = (i === currentDeck);
  doors      = doorsByDeck[currentDeck];
  elDoors    = elDoorsByDeck[currentDeck];
  innerDoors = innerDoorsByDeck[currentDeck];
  hubWalls   = hubWallsByDeck[currentDeck];

camera.position.y = PLAYER_Y - currentDeck * DECK_HEIGHT;

  if (currentDeck === BRIDGE_DECK_INDEX) {
    camera.position.x = 0;
    camera.position.z = BRIDGE_ELEV_Z;
    yaw = 0;
  } else {
    camera.position.x = RING_EL_X;
    camera.position.z = 0;
    yaw = -Math.PI / 2;
  }

  for (const ed of elDoors) {
    ed.target = 0;
    ed.openT = 0;
    ed.panelL.position.x = -EL_DW / 2;
    ed.panelR.position.x =  EL_DW / 2;
  }

  document.getElementById('hud').innerHTML = '<span class="title">IRONCLAD</span><br>DECK ' + DECK_LETTERS[currentDeck];
  if (currentDeck === BRIDGE_DECK_INDEX && engineRoomActive) {
    engineRoomActive = false;
    bridgeRoomGroup.visible = true;
    engineRoomGroup.visible = false;
    bridgeElevCtx.draw();
  }
}

function isValid(x, z) {
  if (currentDeck === BRIDGE_DECK_INDEX) {
    if (Math.sqrt(x*x + z*z) <= BRIDGE_ROOM_R - 16) return true;
    // Elevator cab, embedded in the wall behind the door
    if (Math.abs(x) <= 52 && z >= BRIDGE_ROOM_R - 16 && z <= BRIDGE_ROOM_R + 140 - 12) return true;
    return false;
  }
  const r = Math.sqrt(x*x + z*z);
  const armHalf = HUB_CORRIDOR_HALF - 6;
  // Ring corridor
  if (r >= R_IN - 20 && r <= R_OUT - 16) return true;
  // Hub arms
  if (Math.abs(x) <= armHalf) return true;
  if (Math.abs(z) <= armHalf) return true;
  // Room interiors — check all 12 slots unconditionally
  const slotAng = Math.PI * 2 / TOTAL_SLOTS;
  for (let i = 0; i < TOTAL_SLOTS; i++) {
    const a = i * slotAng;
    const ca = Math.cos(a), sa = Math.sin(a);
    const radial = x * ca + z * sa;
    const tang   = -x * sa + z * ca;
    if (radial >= R_IN - ROOM_DEPTH + 10 && radial <= R_IN + 16) {
      if (Math.abs(tang) <= ROOM_HALF - 6) return true;
    }
  }
  return false;
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  const shiftHeld = keys['ShiftLeft'] || keys['ShiftRight'];
  const wallStretching = editMode && selectedWallMesh && shiftHeld;
  stretchCooldown -= dt;
  if (wallStretching && stretchCooldown <= 0) {
    const geo = selectedWallMesh.geometry;
    const w = geo.parameters.width, h = geo.parameters.height, d = geo.parameters.depth;
    const STEP = 10;
    let changed = false;
    if (keys['ArrowUp'])         { selectedWallMesh.geometry = new THREE.BoxGeometry(w, h, d + STEP); changed = true; }
    else if (keys['ArrowDown'])  { selectedWallMesh.geometry = new THREE.BoxGeometry(w, h, Math.max(10, d - STEP)); changed = true; }
    else if (keys['ArrowRight']) { selectedWallMesh.geometry = new THREE.BoxGeometry(w + STEP, h, d); changed = true; }
    else if (keys['ArrowLeft'])  { selectedWallMesh.geometry = new THREE.BoxGeometry(Math.max(10, w - STEP), h, d); changed = true; }
    if (changed) { stretchCooldown = 0.08; updateWallLabel(); }
  }

  const MOVE_SPEED = (shiftHeld ? 440 : 80) * dt;
  if (!wallStretching && !furnitureEditMode) {
    if (keys['ArrowLeft']  || keys['KeyA']) yaw += TURN_SPEED * dt;
    if (keys['ArrowRight'] || keys['KeyD']) yaw -= TURN_SPEED * dt;
  }
  
  // Furniture edit mode — move with arrow keys
  if (furnitureEditMode && selectedFurniture) {
    const fSpeed = 0.05;
    if (keys['ArrowUp'])    { selectedFurniture.position.z -= fSpeed; }
    if (keys['ArrowDown'])  { selectedFurniture.position.z += fSpeed; }
    if (keys['ArrowLeft'])  { selectedFurniture.position.x -= fSpeed; }
    if (keys['ArrowRight']) { selectedFurniture.position.x += fSpeed; }
    saveFurniture();
  }

  let fx = -Math.sin(yaw), fz = -Math.cos(yaw);
  let mx = 0, mz = 0, my = 0;
  if (!wallStretching && !furnitureEditMode) {
    if (keys['KeyW'] || keys['ArrowUp'])   { mx += fx; mz += fz; }
    if (keys['KeyS'] || keys['ArrowDown']) { mx -= fx; mz -= fz; }
  }
  if (editMode) {
    if (keys['Space']) my += 1;
    if (keys['ControlLeft'] || keys['KeyC']) my -= 1;
  }
  const len = Math.sqrt(mx*mx + mz*mz);
  if (len > 0) { mx /= len; mz /= len; }

  const nx = camera.position.x + mx * MOVE_SPEED;
  const nz = camera.position.z + mz * MOVE_SPEED;
  const deckY = -currentDeck * DECK_HEIGHT;
  if (editMode) {
    camera.position.x = nx;
    camera.position.z = nz;
    camera.position.y = Math.max(5 + deckY, camera.position.y + my * MOVE_SPEED);
  } else {
    if (isValid(nx, nz)) { camera.position.x = nx; camera.position.z = nz; }
    else if (isValid(nx, camera.position.z)) camera.position.x = nx;
    else if (isValid(camera.position.x, nz)) camera.position.z = nz;
    camera.position.y = PLAYER_Y + deckY;
  }

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = 0;

  for (const d of doors) {
    const ddx = camera.position.x - d.group.position.x;
    const ddz = camera.position.z - d.group.position.z;
    if (Math.sqrt(ddx*ddx + ddz*ddz) < 80) d.target = 1;
    else d.target = 0;
    d.openT += (d.target - d.openT) * Math.min(1, dt * 4);
    const slide = d.openT * (DOOR_HALF + 4);
    d.panelL.position.x = -DOOR_HALF / 2 - slide;
    d.panelR.position.x =  DOOR_HALF / 2 + slide;
    d.seam.visible = d.openT < 0.05;
  }

  for (const ed of elDoors) {
    ed.openT += (ed.target - ed.openT) * Math.min(1, dt * 4);
    const slide = ed.openT * (EL_DW + 4);
    ed.panelL.position.x = -EL_DW/2 - slide;
    ed.panelR.position.x =  EL_DW/2 + slide;
  }

  // Inner room doors — auto-open when player is within 150 units
  const _wp = new THREE.Vector3();
  for (const id of innerDoors) {
    id.panelL.getWorldPosition(_wp);
    const dx = camera.position.x - _wp.x;
    const dz = camera.position.z - _wp.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const target = dist < 100 ? 1 : 0;
    id.openT += (target - id.openT) * Math.min(1, dt * 5);
    const slide = id.openT * (id.slideW + 4);
    id.panelL.position.x = id.centerX - id.slideW/2 - slide;
    id.panelR.position.x = id.centerX + id.slideW/2 + slide;
  }

  const ned = nearestElDoor();
  const pr = document.getElementById('prompt');
 const usingRingElevator = currentDeck !== BRIDGE_DECK_INDEX;
  const elevCX = usingRingElevator ? RING_EL_X : 0;
  const elevCZ = currentDeck === BRIDGE_DECK_INDEX ? BRIDGE_ELEV_Z : 0;
  const dxElev = camera.position.x - elevCX;
  const dzElev = camera.position.z - elevCZ;
  let prRadius = Math.sqrt(dxElev*dxElev + dzElev*dzElev);
  const elOpen = elDoors.some(ed => ed.target === 1);  
  elevatorCooldown -= dt;

  // Bridge deck: Engine Room toggle works anywhere on this deck, always shown
  const bn = document.getElementById('bridgeNav');
  if (currentDeck === BRIDGE_DECK_INDEX) {
    bn.style.display = 'block';
    bn.textContent = '🚀 ' + (engineRoomActive ? 'ENGINE ROOM' : 'BRIDGE') + '  —  '
      + (engineRoomActive ? 'Press Q: return to Bridge' : 'Press E: go to Engine Room');
    if (elevatorCooldown <= 0) {
      if (keys['KeyE'] && !engineRoomActive) {
        engineRoomActive = true;
        bridgeRoomGroup.visible = false;
        engineRoomGroup.visible = true;
        bridgeElevCtx.draw();
        elevatorCooldown = 0.4;
      } else if (keys['KeyQ'] && engineRoomActive) {
        engineRoomActive = false;
        bridgeRoomGroup.visible = true;
        engineRoomGroup.visible = false;
        bridgeElevCtx.draw();
        elevatorCooldown = 0.4;
      }
    }
  } else {
    bn.style.display = 'none';
  }

  if (prRadius < EL_HALF) {
    pr.style.display = 'block';
    let deckLine = '🔼 ELEVATOR — DECK ' + DECK_LETTERS[currentDeck] + '  |  ';
    if (currentDeck === BRIDGE_DECK_INDEX) {
      deckLine = '🔼 ELEVATOR — ' + (engineRoomActive ? 'ENGINE ROOM' : 'BRIDGE') + '  |  ';
      deckLine += 'PgUp: Deck ' + DECK_LETTERS[currentDeck - 1];
    } else {
      if (currentDeck > 0) deckLine += 'PgUp: Deck ' + DECK_LETTERS[currentDeck - 1] + '  ';
      if (currentDeck < DECK_LETTERS.length - 1) deckLine += 'PgDn: Deck ' + DECK_LETTERS[currentDeck + 1];
    }
    const doorLine = elOpen ? 'Press O to close door' : 'Press O to open door';
    pr.innerHTML = deckLine + '<br>' + doorLine;
    if (elevatorCooldown <= 0) {
      if (currentDeck === BRIDGE_DECK_INDEX) {
        if (keys['PageUp']) { switchDeck(currentDeck - 1); elevatorCooldown = 0.4; }
      } else {
        if (keys['PageUp'] && currentDeck > 0) { switchDeck(currentDeck - 1); elevatorCooldown = 0.4; }
        else if (keys['PageDown'] && currentDeck < DECK_LETTERS.length - 1) { switchDeck(currentDeck + 1); elevatorCooldown = 0.4; }
      }
    }
  } else if (ned) {
    pr.style.display = 'block';
    pr.textContent = ned.target === 1 ? '🔼 Elevator — Press O to close' : '🔼 Elevator — Press O to open';
  } else pr.style.display = 'none';

  const stars = scene.getObjectByName('stars');
  if (stars) stars.rotation.y += dt * 0.004;

  const dbg = document.getElementById('debug');
  if (dbg.style.display === 'block') {
    const r = Math.sqrt(camera.position.x**2 + camera.position.z**2);
    let deg = ((yaw * 180 / Math.PI) % 360 + 360) % 360;
    dbg.textContent =
      'X: ' + camera.position.x.toFixed(1) +
      '\nY: ' + camera.position.y.toFixed(1) +
      '\nZ: ' + camera.position.z.toFixed(1) +
      '\nRADIUS: ' + r.toFixed(1) +
      '\nYAW: ' + deg.toFixed(1) + '°';
  }

  renderer.render(scene, camera);
}
</script>
